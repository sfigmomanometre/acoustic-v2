audio:
  channels: 16
  chunk_size: 4096
  device_name: UMA-16
  dtype: float32
  preprocessing:
    enable: true
    highpass_cutoff: 100
    lowpass_cutoff: 10000
  sample_rate: 48000
beamforming:
  algorithm: DAS
  frequency:
    bands: 3
    max: 8000
    min: 500
  grid:
    resolution: 0.05
    type: rectangular
    x_range:
    - -1.5
    - 1.5
    y_range:
    - -1.5
    - 1.5
    z: 1.0
  params:
    r_diag: false
calibration:
  calibrated: true
  environment:
    humidity: 50
    pressure: 101325
    temperature: 20
  mic_sensitivity:
    enable: false
    reference_file: data/calibration/sensitivity.txt
  phase_calibration:
    enable: false
    reference_file: data/calibration/phase.txt
  spl_offset_db: 69.5
debug:
  log_file: acoustic_camera.log
  log_level: INFO
  plot_intermediate: false
  show_timing: true
  verbose: true
microphone:
  array_type: circular
  center:
  - 0.0
  - 0.0
  - 0.0
  geometry_file: config/micgeom.xml
  radius: 0.044
performance:
  buffer_size: 10
  cache_results: true
  num_workers: 4
  use_gpu: false
  use_multiprocessing: false
storage:
  enable_recording: false
  format: hdf5
  metadata_fields:
  - timestamp
  - config
  - geometry
  output_dir: data/recordings
  save_metadata: true
video:
  calibration:
    enable: true
    fov: 100
    position:
    - 0.0
    - 0.0
    - 0.0
  device_id: 0
  enable: true
  fps: 30
  resolution:
    height: 1080
    width: 1920
visualization:
  colormap: jet
  dynamic_range: 15
  interpolation: bilinear
  normalization: auto
  overlay:
    alpha: 0.6
    blend_mode: additive
    enable: true
  update_rate: 10
